name: Build Books

on:
  push:
    branches: [main]
    paths: ['books/**', 'scripts/**', 'assets/**', '.github/workflows/**']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc + texlive + calibre
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc texlive-xetex texlive-fonts-extra texlive-latex-extra calibre

      - name: Install Eisvogel template
        run: |
          mkdir -p ~/.local/share/pandoc/templates
          curl -fsSL "https://github.com/Wandmalfarbe/pandoc-latex-template/releases/download/v3.5.0/Eisvogel-3.5.0.zip" -o /tmp/eisvogel.zip
          unzip -o /tmp/eisvogel.zip -d /tmp/eisvogel
          cp /tmp/eisvogel/Eisvogel-3.5.0/eisvogel.latex ~/.local/share/pandoc/templates/

      - name: Fix LaTeX font packages
        run: |
          ln -sf /usr/share/texlive/texmf-dist/tex/latex/sourcesanspro/sourcesanspro.sty /usr/share/texlive/texmf-dist/tex/latex/sourcesanspro/sourcesans.sty 2>/dev/null || true
          ln -sf /usr/share/texlive/texmf-dist/tex/latex/sourceserifpro/sourceserifpro.sty /usr/share/texlive/texmf-dist/tex/latex/sourceserifpro/sourceserif.sty 2>/dev/null || true
          texhash 2>/dev/null || true

      - name: Build all books + library
        run: |
          bash scripts/build-all.sh

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
