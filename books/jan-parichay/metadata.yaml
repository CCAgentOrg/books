about: A comprehensive reference on India's citizen identity layer — Jan Parichay (Meri Pehchaan), the National Single Sign-On built by MeitY and NIC — with the Digital Life Certificate (Jeevan Pramaan) as its central applied case study. Covers the SSO architecture, the life-certificate system, national and state-wise adoption data, and the exclusion, privacy, and governance questions these systems raise. Written through the CashlessConsumer lens — independent, pro-consumer, and grounded in primary sources.
audience:
- Policy professionals
- Fintech practitioners
- Legal researchers
- DPI watchers
- Pension rights advocates
- Students of digital governance
author: CashlessConsumer
compiled: July 2026
description: A definitive reference on Jan Parichay (Meri Pehchaan), India's National Single Sign-On, and the Digital Life Certificate (Jeevan Pramaan) — architecture, adoption data, the state-wise survey, and consumer-protection analysis.
